<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LumiAdmin - 社区管理系统</title>
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('manger_theme');
          var theme = stored === 'light' || stored === 'dark' ? stored : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.dataset.theme = theme;
        } catch(e) {}
      })();
    </script>
    <style>
      /* 防 FOUC：在主样式表加载前先应用正确的主题背景色，避免白屏闪烁 */
      html, body { margin: 0; }
      body { background: #f7f6f3; color: #1a1917; }
      html[data-theme='dark'] body { background: #11100f; color: #f2eee8; }
    </style>
    <script type="module" src="/src/main.jsx"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
