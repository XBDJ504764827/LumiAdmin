// Enable abnormal record guard.
cngokz_recordguard_enabled "1"

// Rule sync interval in seconds.
cngokz_recordguard_rule_sync_interval "60.0"

// Approved abnormal record poll interval in seconds.
cngokz_recordguard_poll_interval "10.0"

// HTTP request timeout in seconds.
cngokz_recordguard_request_timeout "15"

// Verbose recordguard debug logs.
cngokz_recordguard_debug "0"
