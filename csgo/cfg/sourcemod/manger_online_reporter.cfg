// Manger plugin API base URL.
manger_api_base_url "https://text.threi.cn/api/plugin"

// Access snapshot refresh interval in seconds.
manger_access_snapshot_interval "300.0"

// Online player report interval in seconds.
manger_report_interval "15.0"

// Server status report interval in seconds.
manger_status_report_interval "30.0"

// Server port to token mapping: manger_server "<port>" "<token>"
// Each line registers one game server with its report token.
// Example:
//   manger_server "27015" "your-token-here"
//   manger_server "27016" "another-token"
manger_server "10001" ""