// CNGOKZ LumiAdmin plugin API base URL.
cngokz_api_base_url "https://text.threi.cn/api/plugin"

// Verbose CNGOKZ plugin debug logs. Set to 1 only while diagnosing plugin issues.
cngokz_debug_log "0"

// Server port to token mapping: cngokz_server "<port>" "<token>"
// Each line registers one game server with its report token.
// Example:
//   cngokz_server "27015" "your-token-here"
//   cngokz_server "27016" "another-token"
// cngokz_server "10001" "replace-with-report-token"
