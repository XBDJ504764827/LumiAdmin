name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ===== 检测变更模块 =====
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      plugin: ${{ steps.filter.outputs.plugin }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Changed Paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
              - '.github/workflows/**'
            plugin:
              - 'csgo/**'

      - name: Print Detection Result
        run: |
          echo "Frontend changed: ${{ steps.filter.outputs.frontend }}"
          echo "Backend changed: ${{ steps.filter.outputs.backend }}"
          echo "Plugin changed: ${{ steps.filter.outputs.plugin }}"

  # ===== 前端构建 =====
  build-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Test Frontend
        run: |
          cd frontend
          npm ci
          npm test

      - name: Lint Frontend
        run: |
          cd frontend
          npm run lint

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-output
          path: frontend/dist
          retention-days: 1

  # ===== 后端构建 =====
  build-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: lumiadmin_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d lumiadmin_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/lumiadmin_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check Backend
        run: |
          cd backend
          cargo clippy --all-targets
          cargo test

      - name: Build Backend
        run: |
          cd backend
          cargo build --release

      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-output
          path: backend/target/release/manger-backend
          retention-days: 1

  # ===== 插件构建 =====
  build-plugin:
    needs: detect-changes
    if: needs.detect-changes.outputs.plugin == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache SourceMod Compiler
        uses: actions/cache@v4
        with:
          path: csgo/.build
          key: ${{ runner.os }}-sourcemod-1.11.0-git6970

      - name: Build SourceMod Plugins
        run: bash csgo/build_plugins.sh

      - name: Test Plugin Sources
        run: node --test csgo/manger_online_reporter.test.js

      - name: Upload Plugin Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-output
          path: |
            csgo/addons/sourcemod/plugins/manger_online_reporter.smx
            csgo/addons/sourcemod/plugins/manger_edge_sync.smx
          retention-days: 1

  # ===== 部署前端 → CNGOKZ =====
  deploy-frontend-cngokz:
    needs: [detect-changes, build-frontend]
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download Frontend Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-output
          path: dist

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.WEB_SSH_KEY_CNGOKZ }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ vars.WEB_HOST_CNGOKZ }} >> ~/.ssh/known_hosts

      - name: Deploy Frontend
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/deploy_key" dist/ ${{ vars.WEB_USER_CNGOKZ }}@${{ vars.WEB_HOST_CNGOKZ }}:${{ vars.WEB_PATH_CNGOKZ }}/dist/

  # ===== 部署后端 → CNGOKZ =====
  deploy-backend-cngokz:
    needs: [detect-changes, build-backend]
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download Backend Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-output
          path: backend-bin

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.WEB_SSH_KEY_CNGOKZ }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ vars.WEB_HOST_CNGOKZ }} >> ~/.ssh/known_hosts

      - name: Deploy Backend
        run: |
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" backend-bin/manger-backend ${{ vars.WEB_USER_CNGOKZ }}@${{ vars.WEB_HOST_CNGOKZ }}:${{ vars.WEB_PATH_CNGOKZ }}/

      - name: Restart Backend Service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.WEB_HOST_CNGOKZ }}
          username: ${{ vars.WEB_USER_CNGOKZ }}
          key: ${{ secrets.WEB_SSH_KEY_CNGOKZ }}
          script: |
            chmod +x ${{ vars.WEB_PATH_CNGOKZ }}/manger-backend
            sudo systemctl restart manger-backend || true

  # ===== 部署前端 → ILIAN =====
  deploy-frontend-ilian:
    needs: [detect-changes, build-frontend]
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download Frontend Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-output
          path: dist

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.WEB_SSH_KEY_ILIAN }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ vars.WEB_HOST_ILIAN }} >> ~/.ssh/known_hosts

      - name: Deploy Frontend
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/deploy_key" dist/ ${{ vars.WEB_USER_ILIAN }}@${{ vars.WEB_HOST_ILIAN }}:${{ vars.WEB_PATH_ILIAN }}/dist/

  # ===== 部署后端 → ILIAN =====
  deploy-backend-ilian:
    needs: [detect-changes, build-backend]
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download Backend Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-output
          path: backend-bin

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.WEB_SSH_KEY_ILIAN }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ vars.WEB_HOST_ILIAN }} >> ~/.ssh/known_hosts

      - name: Deploy Backend
        run: |
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" backend-bin/manger-backend ${{ vars.WEB_USER_ILIAN }}@${{ vars.WEB_HOST_ILIAN }}:${{ vars.WEB_PATH_ILIAN }}/

      - name: Restart Backend Service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.WEB_HOST_ILIAN }}
          username: ${{ vars.WEB_USER_ILIAN }}
          key: ${{ secrets.WEB_SSH_KEY_ILIAN }}
          script: |
            chmod +x ${{ vars.WEB_PATH_ILIAN }}/manger-backend
            sudo systemctl restart manger-backend || true

  # ===== 部署插件 → CNGOKZ =====
  deploy-plugin-cngokz:
    needs: [detect-changes, build-plugin]
    if: needs.detect-changes.outputs.plugin == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download Plugin Artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-output
          path: plugins

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GAME_SSH_KEY_CNGOKZ }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ vars.GAME_HOST_CNGOKZ }} >> ~/.ssh/known_hosts

      - name: Deploy Plugin
        run: |
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" plugins/manger_online_reporter.smx plugins/manger_edge_sync.smx ${{ vars.GAME_USER_CNGOKZ }}@${{ vars.GAME_HOST_CNGOKZ }}:${{ vars.GAME_PATH_CNGOKZ }}/

      - name: Reload Plugin
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.GAME_HOST_CNGOKZ }}
          username: ${{ vars.GAME_USER_CNGOKZ }}
          key: ${{ secrets.GAME_SSH_KEY_CNGOKZ }}
          script: |
            echo "插件已更新，请执行 sm plugins reload manger_online_reporter; sm plugins reload manger_edge_sync"

  # ===== 部署插件 → ILIAN =====
  deploy-plugin-ilian:
    needs: [detect-changes, build-plugin]
    if: needs.detect-changes.outputs.plugin == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download Plugin Artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-output
          path: plugins

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GAME_SSH_KEY_ILIAN }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ vars.GAME_HOST_ILIAN }} >> ~/.ssh/known_hosts

      - name: Deploy Plugin
        run: |
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" plugins/manger_online_reporter.smx plugins/manger_edge_sync.smx ${{ vars.GAME_USER_ILIAN }}@${{ vars.GAME_HOST_ILIAN }}:${{ vars.GAME_PATH_ILIAN }}/

      - name: Reload Plugin
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.GAME_HOST_ILIAN }}
          username: ${{ vars.GAME_USER_ILIAN }}
          key: ${{ secrets.GAME_SSH_KEY_ILIAN }}
          script: |
            echo "插件已更新，请执行 sm plugins reload manger_online_reporter; sm plugins reload manger_edge_sync"
