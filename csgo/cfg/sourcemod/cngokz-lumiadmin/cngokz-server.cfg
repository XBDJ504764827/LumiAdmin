// Online player report interval in seconds.
cngokz_report_interval "15.0"

// Access snapshot refresh interval in seconds.
cngokz_access_snapshot_interval "300.0"

// Server status report interval in seconds.
cngokz_status_report_interval "30.0"

// Verbose CNGOKZ server plugin debug logs.
cngokz_server_debug "0"

// Allow players when the access API and local access snapshot are both unavailable.
// Set to 0 to fail closed and kick players when access cannot be verified.
cngokz_access_fail_open "1"
